<!-- projects.html -->
<section id="projects" class="bg-gray-100 dark:bg-gray-900 py-16 transition-colors duration-300 raleway-custom">
  <div class="container mx-auto px-4">
    <h2 class="text-4xl font-bold text-center mb-8 dark:text-white raleway-custom">Projects</h2>

    <div class="swiper project-swiper">
      <div class="swiper-wrapper project-swiper-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const projects = [
    { title: "I-BEN", image: "/images/project3.jpg", link: "https://github.com/chiknwy/I_Ben-Project" },
    { title: "Statistic Website", image: "/images/project1.jpg", link: "https://github.com/GabrielNathanael/statistika-web" },
    { title: "Flappy Bird with NEAT", image: "/images/project2.jpg", link: "https://github.com/GabrielNathanael/AI-FlappyBird" },
  ];
  const wrapper = document.querySelector('.project-swiper-wrapper');
  if (!wrapper) return;

  projects.forEach(project => {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';
    slide.innerHTML = `
      <a href="${project.link}" target="_blank">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden">
          <img src="${project.image}" alt="${project.title}" class="w-full h-56 object-cover">
          <div class="p-6">
            <h3 class="text-xl font-semibold dark:text-white">${project.title}</h3>
          </div>
        </div>
      </a>`;
    wrapper.appendChild(slide);
  });

  new Swiper('.project-swiper', {
    slidesPerView: 1,
    spaceBetween: 20,
    breakpoints: {
      640: { slidesPerView: 2 },
      1024: { slidesPerView: 3 }
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    pagination: {
      el: '.swiper-pagination',
      clickable: true
    }
  });
});
</script>
