<!-- kontak.html -->
<section id="kontak" class="py-16">
  <div class="container mx-auto px-4 raleway-custom">
    <h2 class="text-4xl font-bold text-center mb-8 text-gray-900 dark:text-white transition-colors">Contact Me</h2>
    <form id="contactForm" class="max-w-lg mx-auto bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md transition-colors duration-300">
      <div class="mb-4">
        <label for="name" class="block mb-2 text-gray-700 dark:text-gray-300">Your Name</label>
        <input id="name" name="from_name" type="text" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white dark:border-gray-600 dark:focus:ring-blue-400" placeholder="Your name" required />
      </div>
      <div class="mb-4">
        <label for="email" class="block mb-2 text-gray-700 dark:text-gray-300">Your Email</label>
        <input id="email" name="user_email" type="email" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white dark:border-gray-600 dark:focus:ring-blue-400" placeholder="email@example.com" required />
      </div>
      <div class="mb-4">
        <label for="message" class="block mb-2 text-gray-700 dark:text-gray-300">Message</label>
        <textarea id="message" name="message" class="w-full px-3 py-2 border rounded-md h-32 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white dark:border-gray-600 dark:focus:ring-blue-400" placeholder="Write your message" required></textarea>
      </div>
      <div class="text-center">
        <button type="submit" class="bg-blue-500 text-white px-8 py-3 rounded-md hover:bg-blue-600 dark:hover:bg-blue-400 dark:bg-blue-600 transition">Send Message</button>
      </div>
    </form>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  emailjs.init("IEi5Rpo2GniMIrc0a");

  const form = document.getElementById("contactForm");
  if (!form) return;

  form.addEventListener("submit", function(event) {
    event.preventDefault();
    const serviceID = "service_lqb2htf";
    const templateID = "template_xg71zxn";

    emailjs.sendForm(serviceID, templateID, this)
      .then(() => {
        alert("Message sent successfully!");
        form.reset();
      })
      .catch((error) => {
        alert("Failed to send message. Please try again.");
        console.error("Email.js error:", error);
      });
  });
});
</script>
