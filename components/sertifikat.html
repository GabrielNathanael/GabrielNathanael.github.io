<!-- sertifikat.html -->
<section id="sertifikat" class="bg-white dark:bg-gray-800 py-16 transition-colors duration-300">
  <div class="container mx-auto px-4">
    <h2 class="text-4xl font-bold text-center mb-8 dark:text-white raleway-custom">Certificates</h2>

    <div class="swiper certificate-swiper">
      <div class="swiper-wrapper certificate-swiper-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const certificates = [
    { title: "Azure AI Fundamentals", issuer: "Coursera", image: "/images/certificate7.jpg" },
    { title: "Sololearn Introduction to Python", issuer: "Udemy", image: "/images/certificate4.jpg" },
    { title: "HSK 1", issuer: "Udemy", image: "/images/certificate8.jpg" },
    { title: "Sololearn Introduction to C++", issuer: "Udemy", image: "/images/certificate3.jpg" },
    { title: "Sololearn Introduction to HTML", issuer: "Udacity", image: "/images/certificate1.jpg" },
    { title: "Sololearn Introduction to CSS", issuer: "Udemy", image: "/images/certificate2.jpg" },
    { title: "Sololearn Introduction to C", issuer: "Udemy", image: "/images/certificate5.jpg" },
    { title: "Sololearn Introduction to C#", issuer: "Udemy", image: "/images/certificate6.jpg" }
  ];

  const wrapper = document.querySelector('.certificate-swiper-wrapper');
  if (!wrapper) return;

  certificates.forEach(cert => {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';
    slide.innerHTML = `
      <div class="bg-gray-100 dark:bg-gray-700 rounded-lg shadow-md overflow-hidden">
        <img src="${cert.image}" alt="${cert.title}" class="w-full h-56 object-cover">
        <div class="p-6">
          <h3 class="text-xl font-semibold dark:text-white">${cert.title}</h3>
        </div>
      </div>`;
    wrapper.appendChild(slide);
  });

  new Swiper('.certificate-swiper', {
    slidesPerView: 1,
    spaceBetween: 20,
    breakpoints: {
      640: { slidesPerView: 2 },
      1024: { slidesPerView: 3 }
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    pagination: {
      el: '.swiper-pagination',
      clickable: true
    }
  });
});
</script>
